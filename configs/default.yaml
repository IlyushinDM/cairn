# CAIRN – конфигурация по умолчанию
# Все значения обоснованы в описании архитектуры (раздел 5, таблица 3).

seed: 42

model:
  state_dim: 128          # Размерность вектора состояния hi
  context_dim: 16         # Размерность контекстного вектора ci
  metric_dim: 64          # Размерность представления метрик h_met
  log_dim: 32             # Размерность представления журналов h_log
  trace_dim: 16           # Размерность позиционного кода трассировки h_tr

  # Условная смесь гауссовых распределений (раздел 3.1)
  gmm_components: 5       # D – число гауссовых компонент

  # VGAE + скрытые общие факторы (раздел 3.2)
  latent_confounders: 3   # K – число латентных переменных скрытых факторов
  confounder_dim: 32      # dz – размерность латентной переменной

  # Гиперграфовая нейросеть (раздел 3.3)
  hypergraph_layers: 1    # Число слоёв гиперграфовой свёртки
  attention_heads: 8      # Число голов внимания
  attention_layers: 3     # Число слоёв внимания

  # Кодировщик метрик: ветвь разрыва (формула 2.7–2.9)
  breakpoint_window: 60   # W – размер окна в шагах (≈1 мин при 1 Гц)

training:
  lr: 0.001               # Скорость обучения (оптимум по CRFD)
  batch_size: 32
  seed: 42

  # Трёхэтапное обучение (раздел 5.2)
  pretrain_epochs: 50     # Этап 1: нормальные данные (L_UM + L_VAK)
  main_epochs: 100        # Этап 2: аномалии (L_PE + L_nez + L_KR + L_reb)
  finetune_epochs: 30     # Этап 3: совместная оптимизация всех компонентов

  # Заморозка на старте этапа 2 (эпох)
  freeze_epochs: 10

  # Веса компонентов функции потерь λ₁–λ₆ (формула 5.1)
  loss_weights:
    lambda_pe:  1.0       # λ₁: ранжирование причинных эффектов
    lambda_um:  1.0       # λ₂: условная модель нормального состояния
    lambda_vak: 1.0       # λ₃: вариационный автокодировщик
    lambda_nez: 0.5       # λ₄: ограничение независимости
    lambda_kr:  0.5       # λ₅: контрастное разделение
    lambda_reb: 0.1       # λ₆: штраф за необоснованные рёбра

  # Гиперпараметры компонентов потерь
  margin: 0.1             # Отступ для L_PE (формула 5.2)
  tcd_margin: 0.3         # δ_KR: отступ контрастного разделения (формула 5.6)
  beta_kl: 1.0            # β: KL-дивергенция экзогенных переменных (формула 5.4)
  beta_kl_z: 0.1          # β_z: KL-дивергенция скрытых факторов
  cov_reg: 0.0001         # λ_рег: регуляризация ковариации (формула 5.3)

  # Порог аномальности
  anomaly_percentile: 0.99   # ε: допустимая доля ложных срабатываний (формула 3.8)

funnel:
  # Каскадная воронка (раздел 3.5, таблица 1)
  l0_top_k: 30            # Ступень 0: быстрая фильтрация (500 → 30)
  l1_top_k: 5             # Ступень 1: приближённый анализ (30 → 5)
  l2_top_k: 1             # Ступень 2: полный анализ (5 → 1)
  alpha_init: 0.5         # α: начальное значение баланса собственной/соседской аномальности (формула 3.32)
  local_hops: 2           # Размер локального подграфа для ступени 1

decomposition:
  # Трёхрежимная декомпозиция множественных первопричин (раздел 3.3.5)
  additivity_threshold: 0.15  # ε_адд: порог аддитивности η (формула 3.30)
  max_joint_size: 3           # Максимальный размер совместно перебираемых подмножеств

verifier:
  # Верификатор причинного графа (раздел 3.6, таблица 2)
  temporal_tolerance_sec: 15    # Δ_доп: допуск на задержку сбора данных (формула 3.33)
  transitivity_threshold: 0.3   # Порог транзитивности причинного эффекта
  monotonicity_epsilon: 0.05    # ε-порог монотонности вмешательства
  permutation_tests: 10         # K_перм: число перестановок для теста рёбер (формула 3.31)
  edge_significance_threshold: 0.05   # θ_реб
  confounder_threshold: 0.3           # θ_скф: порог корреляции для флага конфаундера

drift:
  # Обнаружение дрейфа распределения (раздел 3.1.5)
  window_size: 100          # Размер скользящего окна NLL
  drift_threshold_factor: 1.5   # Порог δ_дрейф как множитель от δ
  finetune_steps: 10        # Шаги градиентного спуска при дообучении

explanation:
  # Генерация текстового объяснения (раздел 4.3)
  generator_level: template   # template | local_llm | cloud_llm
  local_llm_model: null       # Путь к локальной языковой модели (опционально)
  cloud_llm_timeout_sec: 8

connectors:
  metrics:
    type: csv               # csv | prometheus
    path: data/sample/metrics.csv
    interval_sec: 1
    filter_instances: []    # [] = все доступные экземпляры
    filter_metrics: []      # [] = все доступные метрики
  logs:
    type: file              # file | elasticsearch
    path: data/sample/logs.txt
    min_level: INFO
  traces:
    type: file              # file | jaeger
    path: data/sample/traces.json
  topology:
    type: yaml
    path: data/sample/topology.yaml

gui:
  theme: light
  language: ru

logging:
  level: INFO
  rotation: "10 MB"
  retention: "7 days"
