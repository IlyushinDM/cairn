# CAIRN – конфигурация для демонстрации (MVP)
# Уменьшенные параметры для быстрого запуска без GPU.

_base_: default.yaml   # наследуем от default, переопределяем ниже

seed: 42

model:
  state_dim: 64
  context_dim: 16
  gmm_components: 3
  latent_confounders: 2
  confounder_dim: 16
  hypergraph_layers: 1
  attention_heads: 4
  attention_layers: 2

training:
  pretrain_epochs: 5
  main_epochs: 10
  finetune_epochs: 5
  batch_size: 16

funnel:
  l0_top_k: 10
  l1_top_k: 3
  l2_top_k: 1

connectors:
  metrics:
    type: csv
    path: data/sample/metrics.csv
    interval_sec: 1
  logs:
    type: file
    path: data/sample/logs.txt
  traces:
    type: file
    path: data/sample/traces.json

logging:
  level: DEBUG
