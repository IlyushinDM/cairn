# Prometheus конфигурация для CAIRN + Online Boutique
# Собирает метрики контейнеров через cAdvisor

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # ── cAdvisor – метрики всех контейнеров ────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics
    scrape_interval: 5s

  # ── Сам Prometheus ──────────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
