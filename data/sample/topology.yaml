instances:
- name: frontend-1
  service: frontend
  host: node-1
  cpu_limit: 2.0
  memory_limit: 512
  version: '1.2'
- name: order-service-1
  service: order-service
  host: node-2
  cpu_limit: 4.0
  memory_limit: 1024
  version: '2.1'
- name: payment-service-1
  service: payment-service
  host: node-3
  cpu_limit: 2.0
  memory_limit: 512
  version: '1.5'
- name: cache-service-1
  service: cache-service
  host: node-2
  cpu_limit: 1.0
  memory_limit: 2048
  version: '3.0'
- name: database-1
  service: database
  host: node-4
  cpu_limit: 8.0
  memory_limit: 4096
  version: '14.2'
call_edges:
- - frontend-1
  - order-service-1
- - order-service-1
  - payment-service-1
- - order-service-1
  - database-1
colocation_groups:
- - order-service-1
  - cache-service-1
load_balancer_groups: []
