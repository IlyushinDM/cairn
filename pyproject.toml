[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short -x"
markers = [
    "gpu: требует GPU (пропускается в CI)",
    "slow: долгие тесты (>10с)",
    "integration: интеграционные тесты",
]

[tool.coverage.run]
source = ["src/cairn"]
omit = ["*/test_*", "*/gui/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
fail_under = 70

[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["cairn"]
skip_glob = ["*/migrations/*", "*.pyi"]

[tool.mypy]
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
exclude = ["tests/", "scripts/"]

[[tool.mypy.overrides]]
module = ["torch.*", "numpy.*", "PySide6.*", "matplotlib.*"]
ignore_missing_imports = true
