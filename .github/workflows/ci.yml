name: CAIRN CI

on:
  push:
    branches: [main, feat/**, fix/**]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 isort

      - name: flake8
        run: flake8 src/ scripts/ --config=.flake8

      - name: isort check
        run: isort src/ scripts/ --check-only --diff

  test:
    name: Tests (CPU only)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests (skip GPU and slow)
        run: |
          pytest tests/ \
            -m "not gpu and not slow" \
            --cov=src/cairn \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy + stubs
        run: |
          pip install mypy
          pip install -r requirements.txt

      - name: mypy
        run: |
          mypy src/cairn \
            --ignore-missing-imports \
            --exclude "gui/" \
            --no-error-summary
        continue-on-error: true
